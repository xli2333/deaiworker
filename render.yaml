services:
  - type: web
    name: de-ai-worker-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PORT
        value: "10000"
      - key: BACKEND_HOST
        value: "0.0.0.0"
      - key: DEAI_OUTPUT_ROOT
        value: /app/outputs/tasks
